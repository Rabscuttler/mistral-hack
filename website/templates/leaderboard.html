<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard — Lyrics ELO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body data-results-url="{{ url_for('api_results') }}">
    <div class="header">
      <div class="header-top">
        <div><h1>Lyrics Judge</h1><nav class="nav"><a href="{{ url_for('index') }}">Judge</a> <a href="{{ url_for('leaderboard') }}">Leaderboard</a> <a href="{{ url_for('browse') }}">Browse</a></nav></div>
      </div>
    </div>
    <div class="leaderboard-wrap">
      <div class="total" id="total">Loading...</div>

      <h2 class="section-title">All Time</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Approach</th>
            <th>Win %</th>
            <th>Record</th>
          </tr>
        </thead>
        <tbody id="tbody-alltime"></tbody>
      </table>

      <h2 class="section-title" id="rounds-heading" style="display: none">
        Rounds
      </h2>
      <div id="rounds"></div>

    </div>

    <script>
      (async function () {
        const resultsUrl = document.body.dataset.resultsUrl;
        const res = await fetch(resultsUrl);
        const data = await res.json();

        document.getElementById("total").textContent =
          data.total_judgments + " total judgments";

        // All-time table
        fillTable(document.getElementById("tbody-alltime"), data.leaderboard);

        // Blocks of 10, most recent first
        if (data.blocks && data.blocks.length > 0) {
          document.getElementById("rounds-heading").style.display = "block";
          const container = document.getElementById("rounds");

          data.blocks.forEach((blk, idx) => {
            const block = document.createElement("div");
            block.className = "session-block";

            const label = document.createElement("div");
            label.className = "session-label";
            label.textContent =
              "Round " + (data.blocks.length - idx) + " (" + blk.count + " judgments)";
            block.appendChild(label);

            const table = document.createElement("table");
            const thead = document.createElement("thead");
            thead.innerHTML =
              "<tr><th>#</th><th>Approach</th><th>Win %</th><th>Record</th></tr>";
            table.appendChild(thead);
            const tbody = document.createElement("tbody");
            fillTable(tbody, blk.results);
            table.appendChild(tbody);
            block.appendChild(table);

            container.appendChild(block);
          });
        }

        function fillTable(tbody, rows) {
          rows.forEach((row, i) => {
            const tr = document.createElement("tr");
            tr.innerHTML =
              '<td class="rank">' +
              (i + 1) +
              "</td>" +
              "<td>" +
              escapeHtml(row.approach) +
              "</td>" +
              '<td class="elo">' +
              row.win_rate +
              "%</td>" +
              '<td class="record">' +
              row.wins +
              "W " +
              row.losses +
              "L " +
              row.ties +
              "T</td>";
            tbody.appendChild(tr);
          });
        }

        function escapeHtml(s) {
          const d = document.createElement("div");
          d.textContent = s;
          return d.innerHTML;
        }
      })();
    </script>
  </body>
</html>
